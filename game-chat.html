<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RJAKA — Roles &amp; Actions Card Game</title>
  <style>
    :root {
      --bg: #0e0610;
      --panel: #1a0d16;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f7f5f4;
      --muted: #d6d6d2;
      --accent: #e34a8a;
      --accent-velvet: #b0164d;
      --gold: #f2b94b;
      --turquoise: #2fa4a9;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(243, 140, 196, 0.22), transparent 60%),
        radial-gradient(900px 700px at 80% 0%, rgba(242, 185, 75, 0.25), transparent 55%),
        radial-gradient(1000px 900px at 50% 100%, rgba(47, 164, 169, 0.22), transparent 55%),
        #0e0610;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 12px;
    }
    .chat-shell {
      width: min(960px, 100%);
      background:
        linear-gradient(145deg, rgba(176, 22, 77, 0.22), rgba(227, 74, 138, 0.15)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 520px;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(227, 74, 138, 0.25), rgba(47, 164, 169, 0.15));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo-box {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(242, 185, 75, 0.5);
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      background: radial-gradient(circle at 30% 30%, rgba(242, 185, 75, 0.35), rgba(176, 22, 77, 0.55));
      flex-shrink: 0;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #fbeff7;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
    }
    .status {
      font-size: 0.9rem;
      color: #f2b94b;
      font-weight: 600;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
    }
    .messages {
      padding: 18px 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(47, 164, 169, 0.08), rgba(13, 9, 16, 0.3));
    }
    .bubble {
      max-width: 80%;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      backdrop-filter: blur(1px);
      color: #f8f3f7;
    }
    .bubble.user {
      margin-left: auto;
      background: linear-gradient(145deg, rgba(227, 74, 138, 0.8), rgba(176, 22, 77, 0.8));
      border-color: rgba(242, 185, 75, 0.35);
      box-shadow: 0 14px 36px rgba(176, 22, 77, 0.45);
    }
    .bubble.bot {
      margin-right: auto;
      background: linear-gradient(145deg, rgba(47, 164, 169, 0.8), rgba(14, 6, 16, 0.6));
      border-color: rgba(47, 164, 169, 0.35);
      box-shadow: 0 14px 36px rgba(47, 164, 169, 0.35);
    }
    .bubble.system {
      margin: 0 auto;
      background: transparent;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      color: rgba(242, 185, 75, 0.9);
      font-size: 0.92rem;
      letter-spacing: 0.3px;
      box-shadow: none;
    }
    .composer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      background: linear-gradient(180deg, rgba(176, 22, 77, 0.08), rgba(14, 6, 16, 0.85));
    }
    .composer textarea {
      width: 100%;
      min-height: 78px;
      max-height: 240px;
      border-radius: 14px;
      border: 1px solid rgba(242, 185, 75, 0.55);
      padding: 13px 15px;
      resize: vertical;
      font: inherit;
      color: #f7f2f6;
      background:
        radial-gradient(120% 120% at 20% 15%, rgba(242, 185, 75, 0.08), transparent 55%),
        linear-gradient(160deg, rgba(47, 164, 169, 0.08), rgba(26, 13, 22, 0.9));
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow:
        inset 0 2px 12px rgba(0, 0, 0, 0.35),
        0 8px 26px rgba(0, 0, 0, 0.35);
    }
    .composer textarea::placeholder {
      color: rgba(247, 242, 246, 0.7);
    }
    .composer textarea:focus-visible {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(242, 185, 75, 0.25);
      transform: translateY(-1px);
    }
    .composer button {
      border-radius: 12px;
      border: 1px solid rgba(242, 185, 75, 0.7);
      background: linear-gradient(160deg, #f2b94b, #e34a8a);
      color: #0e0610;
      font-weight: 800;
      padding: 13px 18px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 14px 34px rgba(227, 74, 138, 0.35);
    }
    .composer button:hover,
    .composer button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(242, 185, 75, 0.35);
      outline: none;
    }
    .composer button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    @media (max-width: 720px) {
      .chat-shell {
        min-height: 420px;
      }
      .bubble { max-width: 100%; }
      .composer { grid-template-columns: 1fr; }
      .composer button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <header>
      <div class="brand">
        <div class="logo-box" aria-hidden="true">
          <img src="/assets/rjaka-logo.png" alt="RJAKA" />
        </div>
        <p class="title">RJAKA — Roles &amp; Actions Card Game</p>
      </div>
      <span class="status" id="status">Ready</span>
    </header>
    <div class="messages" id="messages" aria-live="polite"></div>
    <form class="composer" id="composer" autocomplete="off">
      <textarea id="input" placeholder="Describe your issue or question..." required></textarea>
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script>
    (() => {
      const ENDPOINT = '/game_chat.php';
      const STORAGE_KEY = 'game-chat:id';
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const formEl = document.getElementById('composer');
      const sendBtn = document.getElementById('sendBtn');
      const statusEl = document.getElementById('status');

      const state = {
        chatId: restoreChatId(),
        sending: false
      };

      addBubble('system', 'You are connected to the support assistant.');

      formEl.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text || state.sending) return;
        inputEl.value = '';
        addBubble('user', text);
        await send(text);
      });

      async function send(text) {
        setSending(true, 'Sending...');
        try {
          const payload = {
            chat_id: state.chatId,
            message: text,
            page: window.location.pathname,
            metadata: {
              language: navigator.language || 'en'
            }
          };
          const res = await fetch(ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => null);
          if (!res.ok || !data?.success) {
            throw new Error(data?.message || 'Request failed');
          }
          if (data.chat_id) {
            persistChatId(data.chat_id);
            state.chatId = data.chat_id;
          }
          const reply = (data.reply || '').trim();
          if (reply) {
            addBubble('bot', reply);
            setStatus('Assistant replied');
          } else {
            addBubble('system', 'No reply from assistant. Please try again.');
            setStatus('No reply');
          }
        } catch (error) {
          addBubble('system', 'Failed to send: ' + (error?.message || 'unknown error'));
          setStatus('Error');
        } finally {
          setSending(false, 'Ready');
          inputEl.focus();
        }
      }

      function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = 'bubble ' + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setSending(isSending, label) {
        state.sending = isSending;
        sendBtn.disabled = isSending;
        inputEl.disabled = isSending;
        setStatus(label);
      }

      function setStatus(label) {
        if (statusEl) statusEl.textContent = label;
      }

      function restoreChatId() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored && stored.trim()) return stored;
        } catch {}
        const fresh = generateId();
        persistChatId(fresh);
        return fresh;
      }

      function persistChatId(id) {
        try { localStorage.setItem(STORAGE_KEY, id); } catch {}
      }

      function generateId() {
        if (window.crypto?.randomUUID) return crypto.randomUUID();
        return 'chat-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      }
    })();
  </script>
</body>
</html>
