# RJAKA compatibility routes (template)
# Include into server block during transitional split.

location = /chat {
    return 301 /chat/;
}

location = /chat/ {
    try_files /game-chat.html =404;
}

location = /chat/history {
    return 301 /chat/history/;
}

location = /chat/history/ {
    try_files /chat-qa.html =404;
}

location = /game-chat.html {
    return 301 /chat/;
}

location = /chat-qa.html {
    return 301 /chat/history/;
}

location = /game_chat.php {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
}

location = /admin/chat-qa.php {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
}

location = /admin/chat-qa-feedback.php {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
}
