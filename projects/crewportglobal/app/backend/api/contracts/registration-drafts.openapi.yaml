openapi: 3.0.3
info:
  title: CrewPortGlobal Registration Draft API
  version: 0.1.0-draft
  description: |
    CPG-BE-002 endpoint contract scaffold.
    This contract defines request/response shapes for registration draft creation
    and retrieval without prescribing storage or auth implementation.
servers:
  - url: /api/v1
paths:
  /registration/drafts:
    post:
      summary: Create registration draft
      operationId: createRegistrationDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '400':
          description: Invalid request payload
        '409':
          description: Duplicate draft conflict
  /registration/drafts/{draft_id}:
    get:
      summary: Get registration draft
      operationId: getRegistrationDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Draft payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '404':
          description: Draft not found
    patch:
      summary: Update registration draft
      operationId: updateRegistrationDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDraftRequest'
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '400':
          description: Invalid request payload
        '404':
          description: Draft not found
  /vacancies:
    get:
      summary: List reviewed public vacancies
      operationId: listPublicVacancies
      responses:
        '200':
          description: Published vacancies from verified employers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicVacanciesResponse'
components:
  parameters:
    DraftId:
      name: draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateDraftRequest:
      type: object
      required:
        - role
        - email
      properties:
        role:
          type: string
          enum: [seafarer, employer, shipowner, crewing_manager]
        email:
          type: string
          format: email
        full_name:
          type: string
        company_name:
          type: string
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        vessel:
          $ref: '#/components/schemas/VesselDraft'
        vacancy:
          $ref: '#/components/schemas/VacancyRequestDraft'
    UpdateDraftRequest:
      type: object
      properties:
        full_name:
          type: string
        availability_status:
          type: string
          enum: [unknown, available_now, available_later]
        company_name:
          type: string
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        vessel:
          $ref: '#/components/schemas/VesselDraft'
        vacancy:
          $ref: '#/components/schemas/VacancyRequestDraft'
    VesselDraft:
      type: object
      properties:
        vessel_name:
          type: string
        vessel_type:
          type: string
        imo_number:
          type: string
    VacancyRequestDraft:
      type: object
      properties:
        vacancy_title:
          type: string
        rank:
          type: string
        department:
          type: string
          enum: [deck, engine, catering, hotel, other]
        vessel_type:
          type: string
        join_date:
          type: string
          format: date
        contract_duration:
          type: string
        salary_min_usd:
          type: number
          minimum: 0
        salary_max_usd:
          type: number
          minimum: 0
        salary_text:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        employer_country_code:
          type: string
          minLength: 2
          maxLength: 2
        requirements:
          type: string
    RegistrationDraftResponse:
      type: object
      required:
        - draft_id
        - role
        - email
        - status
        - created_at
        - updated_at
      properties:
        draft_id:
          type: string
          format: uuid
        role:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [draft, submitted_for_human_review]
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PublicVacanciesResponse:
      type: object
      required: [ok, vacancies, count, generated_at]
      properties:
        ok:
          type: boolean
        vacancies:
          type: array
          items:
            type: object
            additionalProperties: true
        count:
          type: integer
        generated_at:
          type: string
          format: date-time
