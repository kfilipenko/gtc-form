openapi: 3.0.3
info:
  title: CrewPortGlobal Registration Draft API
  version: 0.1.0-draft
  description: |
    CPG-BE-002 endpoint contract scaffold.
    This contract defines request/response shapes for registration draft creation
    and retrieval without prescribing storage or auth implementation.
servers:
  - url: /api/v1
paths:
  /registration/drafts:
    post:
      summary: Create registration draft
      operationId: createRegistrationDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '400':
          description: Invalid request payload
        '409':
          description: Duplicate draft conflict
  /registration/drafts/{draft_id}:
    get:
      summary: Get registration draft
      operationId: getRegistrationDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Draft payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '404':
          description: Draft not found
    patch:
      summary: Update registration draft
      operationId: updateRegistrationDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDraftRequest'
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationDraftResponse'
        '400':
          description: Invalid request payload
        '404':
          description: Draft not found
  /admin/access/email-code/request:
    post:
      summary: Request admin access email code
      operationId: requestAdminAccessEmailCode
      description: |
        Contract for future admin access email-code request flow. Runtime route is not enabled until access-control storage, email delivery and admin session handling are approved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminEmailCodeRequest'
      responses:
        '202':
          description: Request accepted without revealing whether the email is an eligible admin account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEmailCodeRequestAcceptedResponse'
        '400':
          description: Invalid request payload
        '403':
          description: Admin access is not allowed for the current user
        '429':
          description: Rate limit exceeded
        '503':
          description: Admin access email-code flow is not enabled yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessDisabledResponse'
  /admin/access/email-code/verify:
    post:
      summary: Verify admin access email code
      operationId: verifyAdminAccessEmailCode
      description: |
        Contract for future admin access email-code verification. Runtime route is not enabled until access-control storage, email delivery and admin session handling are approved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminEmailCodeVerifyRequest'
      responses:
        '200':
          description: Admin session marker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessSessionResponse'
        '400':
          description: Invalid request payload
        '401':
          description: Invalid or expired admin access code
        '403':
          description: Admin access is not allowed for the current user
        '429':
          description: Verification attempt limit exceeded
        '503':
          description: Admin access email-code flow is not enabled yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessDisabledResponse'
  /admin/access/team-links:
    get:
      summary: Read protected team links
      operationId: readProtectedTeamLinks
      description: |
        Returns CrewPortGlobal team entry links only for an active protected session whose user belongs to an approved access group such as owners or cpg_team.
      security:
        - AdminSessionBearer: []
      responses:
        '200':
          description: Protected team links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamLinksResponse'
        '401':
          description: Team session is missing, invalid or expired
        '403':
          description: Team access group membership is required
        '503':
          description: Admin access email-code flow is not enabled yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessDisabledResponse'
  /admin/access/management:
    get:
      summary: Read admin access-management snapshot
      operationId: readAdminAccessManagement
      description: |
        Returns users, groups and assignable groups for Project Owner access-management UI. This phase is read plus create-user/add-member only.
      security:
        - AdminSessionBearer: []
      responses:
        '200':
          description: Access-management snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessManagementResponse'
        '401':
          description: Admin session is missing, invalid or expired
        '403':
          description: manage_user_groups permission or Project Owner ownership is required
        '503':
          description: Admin access flow is not enabled
  /admin/access/users:
    post:
      summary: Create or confirm admin-manageable user
      operationId: createAdminAccessUser
      description: |
        Creates or confirms a CrewPortGlobal user record before group membership assignment. Does not assign permissions directly.
      security:
        - AdminSessionBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '200':
          description: Existing user confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserResponse'
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserResponse'
        '400':
          description: Invalid request payload
        '401':
          description: Admin session is missing, invalid or expired
        '403':
          description: manage_user_groups permission or Project Owner ownership is required
        '503':
          description: Admin access flow is not enabled
  /admin/access/group-members:
    post:
      summary: Add user to access group
      operationId: addAdminAccessGroupMember
      description: |
        Adds an existing active user to an assignable internal or administration group. Does not edit group roles.
      security:
        - AdminSessionBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAddGroupMemberRequest'
      responses:
        '200':
          description: Membership already existed and was confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGroupMemberResponse'
        '201':
          description: Membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGroupMemberResponse'
        '400':
          description: Invalid request payload
        '401':
          description: Admin session is missing, invalid or expired
        '403':
          description: Group is not assignable or permission is missing
        '404':
          description: User or group was not found
        '503':
          description: Admin access flow is not enabled
  /vacancies:
    get:
      summary: List reviewed public vacancies
      operationId: listPublicVacancies
      responses:
        '200':
          description: Published vacancies from verified employers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicVacanciesResponse'
components:
  securitySchemes:
    AdminSessionBearer:
      type: http
      scheme: bearer
  parameters:
    DraftId:
      name: draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateDraftRequest:
      type: object
      required:
        - role
        - email
      properties:
        role:
          type: string
          enum: [seafarer, employer, shipowner, crewing_manager]
        email:
          type: string
          format: email
        full_name:
          type: string
        company_name:
          type: string
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        vessel:
          $ref: '#/components/schemas/VesselDraft'
        vacancy:
          $ref: '#/components/schemas/VacancyRequestDraft'
    UpdateDraftRequest:
      type: object
      properties:
        full_name:
          type: string
        availability_status:
          type: string
          enum: [unknown, available_now, available_later]
        company_name:
          type: string
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        vessel:
          $ref: '#/components/schemas/VesselDraft'
        vacancy:
          $ref: '#/components/schemas/VacancyRequestDraft'
    VesselDraft:
      type: object
      properties:
        vessel_name:
          type: string
        vessel_type:
          type: string
        imo_number:
          type: string
    VacancyRequestDraft:
      type: object
      properties:
        vacancy_title:
          type: string
        rank:
          type: string
        department:
          type: string
          enum: [deck, engine, catering, hotel, other]
        vessel_type:
          type: string
        join_date:
          type: string
          format: date
        contract_duration:
          type: string
        salary_min_usd:
          type: number
          minimum: 0
        salary_max_usd:
          type: number
          minimum: 0
        salary_text:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        employer_country_code:
          type: string
          minLength: 2
          maxLength: 2
        requirements:
          type: string
    RegistrationDraftResponse:
      type: object
      required:
        - draft_id
        - role
        - email
        - status
        - created_at
        - updated_at
      properties:
        draft_id:
          type: string
          format: uuid
        role:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [draft, submitted_for_human_review]
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AdminEmailCodeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    AdminEmailCodeVerifyRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[0-9]{6}$'
    AdminEmailCodeRequestAcceptedResponse:
      type: object
      required: [ok, purpose, masked_email, expires_in_seconds, message]
      properties:
        ok:
          type: boolean
        purpose:
          type: string
          enum: [admin_access]
        masked_email:
          type: string
        expires_in_seconds:
          type: integer
          enum: [600]
        message:
          type: string
    AdminAccessSessionResponse:
      type: object
      required: [ok, purpose, admin_session_expires_at]
      properties:
        ok:
          type: boolean
        purpose:
          type: string
          enum: [admin_access]
        admin_session_expires_at:
          type: string
          format: date-time
    AdminAccessDisabledResponse:
      type: object
      required: [ok, error, message]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          enum: [admin_access_flow_not_enabled]
        message:
          type: string
    TeamLinksResponse:
      type: object
      required: [ok, user, access_model, links]
      properties:
        ok:
          type: boolean
          enum: [true]
        user:
          type: object
          required: [user_id, email, groups]
          properties:
            user_id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            groups:
              type: array
              items:
                type: string
        access_model:
          type: object
          required: [mode, allowed_groups]
          properties:
            mode:
              type: string
              enum: [group_membership]
            allowed_groups:
              type: array
              items:
                type: string
        links:
          type: array
          items:
            type: object
            required: [label, url]
            properties:
              label:
                type: string
              url:
                type: string
                format: uri
    AdminAccessManagementResponse:
      type: object
      required: [ok, current_user, users, groups, assignable_groups, allowed_actions]
      properties:
        ok:
          type: boolean
          enum: [true]
        current_user:
          type: object
          additionalProperties: true
        users:
          type: array
          items:
            type: object
            additionalProperties: true
        groups:
          type: array
          items:
            type: object
            additionalProperties: true
        assignable_groups:
          type: array
          items:
            type: object
            additionalProperties: true
        allowed_actions:
          type: array
          items:
            type: string
    AdminCreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          maxLength: 160
    AdminCreateUserResponse:
      type: object
      required: [ok, user]
      properties:
        ok:
          type: boolean
          enum: [true]
        user:
          type: object
          additionalProperties: true
    AdminAddGroupMemberRequest:
      type: object
      required: [email, group_code]
      properties:
        email:
          type: string
          format: email
        group_code:
          type: string
          pattern: '^[a-z0-9_]{2,80}$'
        reason:
          type: string
          maxLength: 500
    AdminGroupMemberResponse:
      type: object
      required: [ok, membership]
      properties:
        ok:
          type: boolean
          enum: [true]
        membership:
          type: object
          additionalProperties: true
    PublicVacanciesResponse:
      type: object
      required: [ok, vacancies, count, generated_at]
      properties:
        ok:
          type: boolean
        vacancies:
          type: array
          items:
            type: object
            additionalProperties: true
        count:
          type: integer
        generated_at:
          type: string
          format: date-time
