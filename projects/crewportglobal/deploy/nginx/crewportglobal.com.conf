# Proposed nginx server block for future CrewPortGlobal.com publication on GTC1.
# Copy to /etc/nginx/sites-available/crewportglobal.com.conf after domain and SSL are ready.

server {
    listen 80;
    listen [::]:80;
    server_name crewportglobal.com www.crewportglobal.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/crewportglobal.com;
        default_type text/plain;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crewportglobal.com www.crewportglobal.com;

    root /var/www/crewportglobal.com;
    index index.html index.md;

    ssl_certificate /etc/nginx/ssl/crewportglobal.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/crewportglobal.com/privkey.pem;

    access_log /var/log/nginx/crewportglobal.access.log;
    error_log /var/log/nginx/crewportglobal.error.log;

    autoindex off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
    }

    location = /api/v1 {
        return 301 /api/v1/;
    }

    location ^~ /api/v1/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/gtc-form/projects/crewportglobal/app/backend/api/public/index.php;
        fastcgi_param SCRIPT_NAME /api/v1/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include /etc/nginx/snippets/crewportglobal-operator-access*.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    location = / {
        default_type text/html;
        try_files /index.html =404;
    }

    location = /index.html {
        default_type text/html;
        try_files $uri =404;
    }

    location ~ \.md$ {
        default_type text/markdown;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/index.html $uri/index.md $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}
