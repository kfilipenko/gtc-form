<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrewPortGlobal | Team</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://crewportglobal.com/team/">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/crewportglobal-docs.css?v=20260530-menu-audit">
  <style>
    :root {
      --team-bg: #eef4f7;
      --team-surface: #ffffff;
      --team-surface-soft: #f7fbfc;
      --team-text: #102a43;
      --team-muted: #4f6575;
      --team-border: #c8d6df;
      --team-border-strong: #96acb8;
      --team-primary: #087a8c;
      --team-primary-strong: #045b69;
      --team-danger: #b42318;
      --team-success: #087443;
    }
    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--team-bg);
      color: var(--team-text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .team-shell {
      min-height: 100vh;
      padding: 28px 18px 42px;
    }
    .team-frame {
      width: min(1120px, 100%);
      margin: 0 auto;
    }
    .team-header,
    .team-panel,
    .team-card {
      border: 1px solid var(--team-border);
      background: var(--team-surface);
      box-shadow: 0 10px 32px rgba(16, 42, 67, 0.08);
    }
    .team-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 16px;
    }
    .team-brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .team-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #0b6f82;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }
    .team-title {
      margin: 0;
      color: var(--team-text);
      font-size: 24px;
      line-height: 1.2;
    }
    .team-subtitle {
      margin: 4px 0 0;
      color: var(--team-muted);
      font-size: 13px;
    }
    .team-button {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: var(--team-primary);
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .team-button:hover {
      background: var(--team-primary-strong);
    }
    .team-button.secondary {
      background: var(--team-surface);
      border-color: var(--team-border-strong);
      color: var(--team-text);
    }
    .team-button.danger {
      background: var(--team-danger);
      color: #ffffff;
    }
    .team-button:disabled {
      cursor: wait;
      opacity: 0.62;
    }
    .team-panel {
      width: min(620px, 100%);
      margin: 56px auto 0;
      padding: 24px;
      border-radius: 16px;
    }
    .team-console {
      display: grid;
      gap: 16px;
    }
    .team-login[hidden],
    .team-console[hidden] {
      display: none;
    }
    .team-form,
    .team-grid {
      display: grid;
      gap: 16px;
    }
    .team-field {
      display: grid;
      gap: 7px;
    }
    .team-field label,
    .team-section-title {
      color: var(--team-text);
      font-weight: 800;
    }
    .team-field input {
      width: 100%;
      min-height: 46px;
      box-sizing: border-box;
      padding: 11px 13px;
      border-radius: 10px;
      border: 1px solid var(--team-border-strong);
      background: var(--team-surface);
      color: var(--team-text);
      font: inherit;
      font-weight: 700;
    }
    .team-field input:focus,
    .team-button:focus-visible {
      outline: 3px solid rgba(8, 122, 140, 0.24);
      outline-offset: 2px;
    }
    .team-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .team-note,
    .team-status,
    .team-meta {
      color: var(--team-muted);
      line-height: 1.5;
    }
    .team-note,
    .team-status {
      margin: 0;
      font-size: 13px;
    }
    .team-status {
      min-height: 24px;
      font-weight: 700;
    }
    .team-status.ok {
      color: var(--team-success);
    }
    .team-status.error {
      color: var(--team-danger);
    }
    .team-card {
      padding: 16px;
      border-radius: 14px;
    }
    .team-section-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.25;
    }
    .team-link-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .team-link-list a {
      display: block;
      min-height: 44px;
      padding: 11px 12px;
      border: 1px solid var(--team-border);
      border-radius: 10px;
      background: var(--team-surface-soft);
      color: var(--team-text);
      font-weight: 800;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    .team-link-list a:hover {
      border-color: var(--team-primary);
      color: var(--team-primary-strong);
    }
    .team-task-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .team-task {
      display: grid;
      gap: 7px;
      padding: 12px;
      border: 1px solid var(--team-border);
      border-radius: 10px;
      background: var(--team-surface-soft);
    }
    .team-task__top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .team-task__heading {
      display: flex;
      min-width: 0;
      gap: 8px;
      align-items: flex-start;
    }
    .team-task__number {
      flex: 0 0 auto;
      min-width: 34px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(8, 122, 140, 0.12);
      color: var(--team-primary-strong);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }
    .team-task__title {
      margin: 0;
      font-weight: 900;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .team-task__title a {
      color: var(--team-text);
      text-decoration: none;
    }
    .team-task__title a:hover,
    .team-task__title a:focus-visible {
      color: var(--team-primary-strong);
      text-decoration: underline;
    }
    .team-task__description {
      display: block;
      margin-top: 3px;
      color: var(--team-muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }
    .team-task__badge {
      flex: 0 0 auto;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(8, 122, 140, 0.12);
      color: var(--team-primary-strong);
      font-size: 12px;
      font-weight: 900;
    }
    .team-task__meta {
      margin: 0;
      color: var(--team-muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .team-task__meta-list {
      display: grid;
      gap: 4px;
      margin: 0;
      color: var(--team-muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .team-task__link {
      color: var(--team-primary-strong);
      font-weight: 900;
      text-decoration: none;
    }
    .team-task__link:hover {
      text-decoration: underline;
    }
    .team-task-feedback {
      display: grid;
      gap: 4px;
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid rgba(8, 116, 67, 0.28);
      border-radius: 10px;
      background: rgba(8, 116, 67, 0.08);
      color: var(--team-success);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }
    .team-task-feedback[hidden] {
      display: none;
    }
    @media (max-width: 760px) {
      .team-header {
        display: grid;
      }
      .team-panel {
        margin-top: 24px;
        padding: 18px;
      }
      .team-link-list {
        grid-template-columns: 1fr;
      }
      .team-actions {
        display: grid;
      }
      .team-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="team-shell">
    <div class="team-frame">
      <header class="team-header">
        <div class="team-brand">
          <div class="team-mark" aria-hidden="true">CPG</div>
          <div>
            <h1 class="team-title">CrewPortGlobal team</h1>
            <p class="team-subtitle">Protected links for approved project groups</p>
          </div>
        </div>
        <button class="team-button danger" type="button" id="logout-button" hidden>Logout</button>
      </header>

      <div data-cpg-navigation="application" data-cpg-nav-active="/team/"></div>

      <section class="team-panel team-login" id="login-panel" aria-labelledby="login-title">
        <h2 class="team-section-title" id="login-title">Team code login</h2>
        <form class="team-form" id="team-access-form">
          <div class="team-field">
            <label for="team-email">Email</label>
            <input id="team-email" name="email" type="email" autocomplete="email" autocapitalize="none" spellcheck="false" placeholder="name@example.com" required>
          </div>
          <p class="team-note">Access is granted through approved operational group membership.</p>

          <div class="team-actions">
            <button class="team-button" type="button" id="request-code">Send code</button>
            <button class="team-button secondary" type="button" id="clear-code">Clear</button>
          </div>

          <div class="team-field">
            <label for="team-code">Code</label>
            <input id="team-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required>
          </div>

          <div class="team-actions">
            <button class="team-button" type="submit" id="verify-code">Open team links</button>
          </div>

          <p class="team-status" id="team-status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="team-console" id="team-console" hidden aria-labelledby="team-links-title">
        <section class="team-card">
          <h2 class="team-section-title" id="team-tasks-title">My tasks</h2>
          <p class="team-meta" id="team-task-status">Computed from current data state.</p>
          <p class="team-task-feedback" id="team-task-feedback" hidden></p>
          <ul class="team-task-list" id="team-task-list"></ul>
        </section>
        <section class="team-card">
          <h2 class="team-section-title" id="team-links-title">Team links</h2>
          <p class="team-meta" id="team-meta">-</p>
          <ul class="team-link-list" id="team-link-list"></ul>
        </section>
      </section>
    </div>
  </main>

  <script src="/assets/crewportglobal-machine-translations.js?v=53345f0f8938ec76"></script>
  <script src="/assets/crewportglobal-public-i18n.js?v=20260530-menu-audit"></script>
  <script src="/assets/crewportglobal-navigation.js?v=20260530-menu-audit"></script>
  <script>
    const TEAM_SESSION_KEY = 'crewportglobal_team_session';
    const ADMIN_SESSION_KEY = 'crewportglobal_admin_session';
    const TEAM_TASK_FEEDBACK_KEY = 'crewportglobal_team_task_feedback';
    const form = document.getElementById('team-access-form');
    const email = document.getElementById('team-email');
    const code = document.getElementById('team-code');
    const statusNode = document.getElementById('team-status');
    const requestButton = document.getElementById('request-code');
    const verifyButton = document.getElementById('verify-code');
    const clearButton = document.getElementById('clear-code');
    const logoutButton = document.getElementById('logout-button');
    const loginPanel = document.getElementById('login-panel');
    const consolePanel = document.getElementById('team-console');
    const linkList = document.getElementById('team-link-list');
    const metaNode = document.getElementById('team-meta');
    const taskStatusNode = document.getElementById('team-task-status');
    const taskFeedbackNode = document.getElementById('team-task-feedback');
    const taskList = document.getElementById('team-task-list');

    function setStatus(message, type = '') {
      statusNode.textContent = message;
      statusNode.className = `team-status ${type}`.trim();
    }

    function setBusy(isBusy) {
      requestButton.disabled = isBusy;
      verifyButton.disabled = isBusy;
      logoutButton.disabled = isBusy;
    }

    function sessionToken() {
      return window.localStorage.getItem(TEAM_SESSION_KEY)
        || window.localStorage.getItem(ADMIN_SESSION_KEY)
        || '';
    }

    function storeSession(token) {
      window.localStorage.setItem(TEAM_SESSION_KEY, token);
    }

    function clearSession() {
      window.localStorage.removeItem(TEAM_SESSION_KEY);
    }

    async function postJson(path, payload = {}, token = '') {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(path, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload),
      });
      const body = await response.json().catch(() => ({}));
      return { response, body };
    }

    async function getJson(path, token = '') {
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(path, { headers });
      const body = await response.json().catch(() => ({}));
      return { response, body };
    }

    function showLogin(message = '') {
      loginPanel.hidden = false;
      consolePanel.hidden = true;
      logoutButton.hidden = true;
      setStatus(message);
    }

    function showConsole() {
      loginPanel.hidden = true;
      consolePanel.hidden = false;
      logoutButton.hidden = false;
    }

    function renderLinks(body) {
      const groups = Array.isArray(body.user?.groups) ? body.user.groups.join(', ') : 'none';
      metaNode.textContent = `${body.user?.email || 'team member'} | groups: ${groups}`;
      linkList.replaceChildren();
      const links = Array.isArray(body.links) ? body.links.slice() : [];
      links.push({
        label: 'Protected registry detail',
        url: '/team/registry/',
      });
      links.push({
        label: 'Request-supply comparison',
        url: '/team/matching/',
      });
      links.push({
        label: 'Shortlist draft history',
        url: '/team/shortlists/',
      });
      links.push({
        label: 'Translation review queue',
        url: '/team/translations/',
      });
      for (const link of links) {
        const item = document.createElement('li');
        const anchor = document.createElement('a');
        anchor.href = link.url;
        anchor.textContent = link.label;
        anchor.rel = 'noopener noreferrer';
        if (String(link.url || '').startsWith('https://github.com/')) {
          anchor.target = '_blank';
        }
        item.append(anchor);
        linkList.append(item);
      }
    }

    function textOrDash(value) {
      const text = String(value || '').trim();
      return text || '-';
    }

    function taskValue(task, path, fallback = '') {
      const keys = Array.isArray(path) ? path : String(path || '').split('.');
      let current = task;
      for (const key of keys) {
        if (!current || typeof current !== 'object' || !(key in current)) {
          return fallback;
        }
        current = current[key];
      }
      const text = String(current || '').trim();
      return text || fallback;
    }

    function taskOperation(task) {
      return taskValue(task, 'operation_code');
    }

    function taskBusinessTitle(task) {
      const operation = taskOperation(task);
      if (operation === 'create_internal_shortlist_draft') {
        return 'Create internal shortlist draft.';
      }
      if (operation === 'approve_internal_shortlist') {
        return 'Approve internal shortlist.';
      }
      if (operation === 'create_review_applications') {
        return 'Create candidate presentation review.';
      }
      if (operation === 'review_candidate_presentation') {
        return 'Approve candidate for employer presentation.';
      }
      if (operation === 'review_seafarer_profile_completeness') {
        return 'Review seafarer profile completeness.';
      }
      if (operation === 'review_company_verification') {
        return 'Review company verification.';
      }
      if (operation === 'confirm_vacancy_deletion') {
        return 'Confirm deletion request.';
      }
      if (operation === 'reject_vacancy_deletion') {
        return 'Reject deletion request.';
      }
      return textOrDash(task.title);
    }

    function taskObjectType(task) {
      const operation = taskOperation(task);
      const type = taskValue(task, 'task_type') || taskValue(task, 'record_type');
      if (operation === 'create_internal_shortlist_draft' || type === 'demand_candidate_search') {
        return 'Crew request';
      }
      if (operation === 'approve_internal_shortlist' || operation === 'create_review_applications' || type === 'internal_shortlist_workflow') {
        return 'Internal shortlist';
      }
      if (operation === 'review_candidate_presentation' || type === 'candidate_presentation_review') {
        return 'Candidate presentation';
      }
      if (operation === 'review_seafarer_profile_completeness' || type === 'seafarer_supply_review') {
        return 'Seafarer profile';
      }
      if (operation === 'review_company_verification' || type === 'company_authority_review') {
        return 'Company';
      }
      if (operation === 'confirm_vacancy_deletion' || operation === 'reject_vacancy_deletion' || type === 'vacancy_deletion_confirmation') {
        return 'Deletion request';
      }
      return textOrDash(task.record_type || type);
    }

    function taskSafeSummary(task) {
      const context = task && typeof task.context === 'object' && task.context !== null ? task.context : {};
      const parts = [
        task.summary,
        context.rank,
        context.department,
        context.company_name,
        context.vessel_name,
      ].map((value) => String(value || '').trim()).filter(Boolean);
      return parts.length ? parts.join(', ') : textOrDash(task.record_id);
    }

    function taskProcessStage(task) {
      const operation = taskOperation(task);
      if (operation === 'create_internal_shortlist_draft') {
        return 'Request-supply matching and shortlist preparation';
      }
      if (operation === 'approve_internal_shortlist') {
        return 'Internal shortlist approval';
      }
      if (operation === 'create_review_applications') {
        return 'Candidate presentation review preparation';
      }
      if (operation === 'review_candidate_presentation') {
        return 'Employer-facing candidate presentation review';
      }
      if (operation === 'review_seafarer_profile_completeness') {
        return 'Seafarer supply readiness review';
      }
      if (operation === 'review_company_verification') {
        return 'Employer and authority setup';
      }
      if (operation === 'confirm_vacancy_deletion' || operation === 'reject_vacancy_deletion') {
        return 'Controlled deletion confirmation';
      }
      if (taskValue(task, 'task_type') === 'demand_candidate_search') {
        return 'Request-supply matching and shortlist preparation';
      }
      return 'Computed team operation';
    }

    function taskVisibilityCondition(task) {
      const operation = taskOperation(task);
      const status = taskValue(task, 'current_status') || taskValue(task, 'context.status') || taskValue(task, 'context.draft_status');
      if (operation === 'confirm_vacancy_deletion' || operation === 'reject_vacancy_deletion') {
        return 'Visible until manager confirms or rejects the deletion request.';
      }
      if (operation) {
        return 'Visible until this computed operation is completed or blocked by guard.';
      }
      if (status) {
        return `Visible because workflow status is ${status}.`;
      }
      return 'Visible because current data state creates this group task.';
    }

    function taskResponsibleLines(task) {
      const access = task && typeof task.required_access === 'object' && task.required_access !== null
        ? task.required_access
        : {};
      const group = textOrDash(access.target_group_code);
      const permission = textOrDash(access.required_permission_code);
      const assignee = textOrDash(taskValue(task, 'context.assigned_user_label'));
      return [
        `Group: ${group}`,
        assignee !== '-' ? `Assigned employee: ${assignee}` : 'Assigned employee: group queue',
        `Permission: ${permission}`,
      ];
    }

    function takeTaskFeedback() {
      try {
        const raw = window.localStorage.getItem(TEAM_TASK_FEEDBACK_KEY) || '';
        if (!raw) return null;
        window.localStorage.removeItem(TEAM_TASK_FEEDBACK_KEY);
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch (error) {
        return null;
      }
    }

    function renderTaskFeedback() {
      const feedback = takeTaskFeedback();
      if (!feedback) {
        taskFeedbackNode.hidden = true;
        taskFeedbackNode.textContent = '';
        return;
      }

      const parts = [
        `Operation completed: ${textOrDash(feedback.operation_code)}`,
        `result: ${textOrDash(feedback.result_status)}`,
        `next group: ${textOrDash(feedback.next_responsible_group)}`,
        'Task list below is recomputed from current data.',
      ];
      taskFeedbackNode.textContent = parts.join(' | ');
      taskFeedbackNode.hidden = false;
    }

    function renderTasks(body) {
      const tasks = Array.isArray(body.tasks) ? body.tasks : [];
      const groups = Array.isArray(body.user?.groups) ? body.user.groups.join(', ') : 'none';
      taskStatusNode.textContent = `${tasks.length} computed task(s). Model: ${body.task_model || 'current_data_state'}. Groups: ${groups}.`;
      renderTaskFeedback();
      taskList.replaceChildren();
      if (tasks.length === 0) {
        const item = document.createElement('li');
        item.className = 'team-task';
        const note = document.createElement('p');
        note.className = 'team-task__meta';
        note.textContent = 'No available computed tasks for this session.';
        item.append(note);
        taskList.append(item);
        return;
      }

      tasks.forEach((task, index) => {
        const item = document.createElement('li');
        item.className = 'team-task';

        const top = document.createElement('div');
        top.className = 'team-task__top';
        const heading = document.createElement('div');
        heading.className = 'team-task__heading';
        const number = document.createElement('span');
        number.className = 'team-task__number';
        number.textContent = `#${index + 1}`;
        const title = document.createElement('p');
        title.className = 'team-task__title';
        const link = document.createElement('a');
        link.className = 'team-task__link';
        link.href = task.target_url || task.action_url || '/verify/';
        const titleText = document.createElement('span');
        titleText.textContent = taskBusinessTitle(task);
        const description = document.createElement('span');
        description.className = 'team-task__description';
        description.textContent = `(${taskObjectType(task)}: ${taskSafeSummary(task)}.)`;
        link.append(titleText, description);
        title.append(link);
        const badge = document.createElement('span');
        badge.className = 'team-task__badge';
        badge.textContent = 'Computed task';
        heading.append(number, title);
        top.append(heading, badge);

        const state = document.createElement('div');
        state.className = 'team-task__meta-list';
        [
          `Stage: ${taskProcessStage(task)}`,
          taskVisibilityCondition(task),
          ...taskResponsibleLines(task),
        ].forEach((line) => {
          const row = document.createElement('div');
          row.textContent = line;
          state.append(row);
        });

        item.append(top, state);
        taskList.append(item);
      });
    }

    async function loadTasks(token) {
      taskStatusNode.textContent = 'Loading computed tasks...';
      taskList.replaceChildren();
      const { response, body } = await getJson('/api/v1/team/workbench/tasks', token);
      if (!response.ok || body.ok !== true) {
        taskStatusNode.textContent = body.message || 'Computed tasks are not available for this session.';
        return;
      }
      renderTasks(body);
    }

    async function loadLinks() {
      const token = sessionToken();
      const { response, body } = await getJson('/api/v1/admin/access/team-links', token);
      if (!response.ok || body.ok !== true) {
        if (response.status === 403) {
          showLogin('This account is not in an approved team access group.');
          return;
        }
        if (token) {
          clearSession();
        }
        showLogin('Session expired. Please request a new code.');
        return;
      }
      renderLinks(body);
      await loadTasks(token);
      showConsole();
    }

    requestButton.addEventListener('click', async () => {
      if (!email.reportValidity()) return;
      const memberEmail = email.value.trim().toLowerCase();
      setBusy(true);
      setStatus('Sending code...');
      code.value = '';
      clearSession();
      try {
        const { response, body } = await postJson('/api/v1/admin/access/email-code/request', {
          email: memberEmail,
        });
        if (!response.ok || body.ok !== true) {
          setStatus(body.message || 'Code request failed.', 'error');
          return;
        }
        setStatus('Code sent if this e-mail belongs to an approved access group. Use the newest email code.', 'ok');
        code.focus();
      } catch (error) {
        setStatus('Code request failed.', 'error');
      } finally {
        setBusy(false);
      }
    });

    clearButton.addEventListener('click', () => {
      code.value = '';
      setStatus('');
      code.focus();
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!email.reportValidity() || !code.reportValidity()) return;
      const memberEmail = email.value.trim().toLowerCase();
      setBusy(true);
      setStatus('Verifying code...');
      try {
        const { response, body } = await postJson('/api/v1/admin/access/email-code/verify', {
          email: memberEmail,
          code: code.value,
        });
        if (!response.ok || body.ok !== true || !body.admin_session_token) {
          setStatus(body.message || 'Invalid or expired code. Request a new code and use the newest email.', 'error');
          return;
        }
        storeSession(body.admin_session_token);
        code.value = '';
        await loadLinks();
      } catch (error) {
        setStatus('Code verification failed.', 'error');
      } finally {
        setBusy(false);
      }
    });

    logoutButton.addEventListener('click', async () => {
      const token = sessionToken();
      setBusy(true);
      try {
        if (token) {
          await postJson('/api/v1/admin/access/session/revoke', {}, token);
        }
      } finally {
        clearSession();
        setBusy(false);
        showLogin('Session closed.');
      }
    });

    loadLinks().catch(() => {
      clearSession();
      showLogin();
    });
  </script>
</body>
</html>
