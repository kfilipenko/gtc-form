<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>РЖАКА - Ваш помощник в игре</title>
  <link rel="icon" href="/assets/game-chat/favicons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/game-chat/favicons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/game-chat/favicons/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/game-chat/favicons/apple-touch-icon.png" />
  <style>
    :root {
      --bg: #0e0610;
      --panel: #1a0d16;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f7f5f4;
      --muted: #d6d6d2;
      --accent: #e34a8a;
      --accent-velvet: #b0164d;
      --gold: #f2b94b;
      --turquoise: #2fa4a9;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(243, 140, 196, 0.22), transparent 60%),
        radial-gradient(900px 700px at 80% 0%, rgba(242, 185, 75, 0.25), transparent 55%),
        radial-gradient(1000px 900px at 50% 100%, rgba(47, 164, 169, 0.22), transparent 55%),
        #0e0610;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .chat-shell {
      width: min(960px, 100%);
      background:
        linear-gradient(145deg, rgba(176, 22, 77, 0.22), rgba(227, 74, 138, 0.15)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 520px;
      height: calc(100vh - 24px);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(227, 74, 138, 0.25), rgba(47, 164, 169, 0.15));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo-box {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(242, 185, 75, 0.5);
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      background: radial-gradient(circle at 30% 30%, rgba(242, 185, 75, 0.35), rgba(176, 22, 77, 0.55));
      flex-shrink: 0;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #fbeff7;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff4d4f;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 77, 79, 0.22);
      flex-shrink: 0;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }
    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.22);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .history-link {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      border: 1px solid rgba(242, 185, 75, 0.7);
      background: linear-gradient(160deg, #f2b94b, #e34a8a);
      color: #0e0610;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(227, 74, 138, 0.35);
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .history-link:hover,
    .history-link:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 34px rgba(242, 185, 75, 0.35);
      outline: none;
    }
    .history-link svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    .messages {
      padding: 18px 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(47, 164, 169, 0.08), rgba(13, 9, 16, 0.3));
    }
    .bubble {
      max-width: 80%;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      backdrop-filter: blur(1px);
      color: #f8f3f7;
    }
    .bubble.user {
      margin-left: auto;
      background: linear-gradient(145deg, rgba(227, 74, 138, 0.8), rgba(176, 22, 77, 0.8));
      border-color: rgba(242, 185, 75, 0.35);
      box-shadow: 0 14px 36px rgba(176, 22, 77, 0.45);
    }
    .bubble.bot {
      margin-right: auto;
      background: linear-gradient(145deg, rgba(47, 164, 169, 0.8), rgba(14, 6, 16, 0.6));
      border-color: rgba(47, 164, 169, 0.35);
      box-shadow: 0 14px 36px rgba(47, 164, 169, 0.35);
    }
    .bubble.system {
      margin: 0 auto;
      background: transparent;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      color: rgba(242, 185, 75, 0.9);
      font-size: 0.92rem;
      letter-spacing: 0.3px;
      box-shadow: none;
    }
    .composer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      background: linear-gradient(180deg, rgba(176, 22, 77, 0.08), rgba(14, 6, 16, 0.85));
    }
    .composer textarea {
      width: 100%;
      min-height: 68px;
      max-height: 240px;
      border-radius: 14px;
      border: 1px solid rgba(242, 185, 75, 0.55);
      padding: 13px 15px;
      resize: vertical;
      font: inherit;
      color: #f7f2f6;
      background:
        radial-gradient(120% 120% at 20% 15%, rgba(242, 185, 75, 0.08), transparent 55%),
        linear-gradient(160deg, rgba(47, 164, 169, 0.08), rgba(26, 13, 22, 0.9));
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow:
        inset 0 2px 12px rgba(0, 0, 0, 0.35),
        0 8px 26px rgba(0, 0, 0, 0.35);
    }
    .composer textarea::placeholder {
      color: rgba(247, 242, 246, 0.7);
    }
    .composer textarea:focus-visible {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(242, 185, 75, 0.25);
      transform: translateY(-1px);
    }
    .composer button {
      position: relative;
      border-radius: 12px;
      border: 1px solid rgba(242, 185, 75, 0.7);
      background: linear-gradient(160deg, #f2b94b, #e34a8a);
      color: #0e0610;
      font-weight: 800;
      width: 58px;
      height: 58px;
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 14px 34px rgba(227, 74, 138, 0.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      line-height: 1;
    }
    .composer button:hover,
    .composer button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(242, 185, 75, 0.35);
      outline: none;
    }
    .composer button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .send-tooltip {
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      background: rgba(14, 6, 16, 0.94);
      color: #f7f2f6;
      border: 1px solid rgba(242, 185, 75, 0.5);
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s ease;
      pointer-events: none;
      z-index: 4;
    }
    .composer button:hover .send-tooltip,
    .composer button:focus-visible .send-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    @media (max-width: 720px) {
      body {
        padding: 0;
      }
      .chat-shell {
        min-height: 100dvh;
        height: 100dvh;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
      header { padding: 12px 14px; }
      .messages { padding: 12px 14px; }
      .composer { padding: 12px 14px; }
      .bubble { max-width: 100%; }
      .composer { grid-template-columns: 1fr; }
      .composer button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <header>
      <div class="brand">
        <div class="logo-box" aria-hidden="true">
          <img src="/assets/game-chat/favicons/rjaka-logo.png" alt="RJAKA" onerror="this.onerror=null;this.src='/assets/game-chat/favicons/logo.png';" />
        </div>
        <p class="title">РЖАКА - Ваш помощник в игре</p>
      </div>
      <div class="header-actions">
        <a class="history-link" href="/chat-qa.html" target="_blank" rel="noopener noreferrer" title="История чатов" aria-label="Открыть историю чатов">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2"/>
            <path d="M16 16L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </a>
        <span class="status-dot" id="status" role="status" aria-label="Нет соединения с чатом" title="Нет соединения с чатом"></span>
      </div>
    </header>
    <div class="messages" id="messages" aria-live="polite"></div>
    <form class="composer" id="composer" autocomplete="off">
      <textarea id="input" placeholder="Спросите РЖАКУ: правила, роли, спорные моменты" required></textarea>
      <button type="submit" id="sendBtn" aria-label="Отправить">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px;display:block;">
          <path d="M3 11.5L20.2 4.8C20.8 4.6 21.4 5.2 21.2 5.8L14.5 23C14.2 23.8 13.1 23.7 12.9 22.9L11.2 16.8C11.1 16.5 10.9 16.3 10.6 16.2L4.5 14.5C3.7 14.3 3.6 13.2 4.4 12.9L12.5 9.8" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="send-tooltip" aria-hidden="true">Отправить</span>
      </button>
    </form>
  </div>

  <script>
    (() => {
      const ENDPOINT = '/game_chat.php';
      const STORAGE_KEY = 'game-chat:id';
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const formEl = document.getElementById('composer');
      const sendBtn = document.getElementById('sendBtn');
      const statusEl = document.getElementById('status');
      const SHOW_SYSTEM_ERROR_BUBBLES = false;

      const state = {
        chatId: restoreChatId(),
        sending: false,
        connected: false
      };

      setConnection(false);

      window.addEventListener('offline', () => {
        setConnection(false);
      });

      formEl.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text || state.sending) return;
        inputEl.value = '';
        addBubble('user', text);
        await send(text);
      });

      async function send(text) {
        setSending(true);
        try {
          const payload = {
            chat_id: state.chatId,
            message: text,
            page: window.location.pathname,
            metadata: {
              language: navigator.language || 'ru'
            }
          };
          const res = await fetch(ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => null);
          if (!res.ok || !data?.success) {
            throw new Error(data?.message || 'Ошибка запроса');
          }
          if (data.chat_id) {
            persistChatId(data.chat_id);
            state.chatId = data.chat_id;
          }
          const reply = (data.reply || '').trim();
          setConnection(true);
          if (reply) {
            addBubble('bot', reply);
          } else {
            if (SHOW_SYSTEM_ERROR_BUBBLES) {
              addBubble('system', 'Ответ от ассистента не получен. Попробуйте ещё раз.');
            }
          }
        } catch (error) {
          setConnection(false);
          if (SHOW_SYSTEM_ERROR_BUBBLES) {
            addBubble('system', 'Не удалось отправить: ' + (error?.message || 'неизвестная ошибка'));
          }
        } finally {
          setSending(false);
          inputEl.focus();
        }
      }

      function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = 'bubble ' + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setSending(isSending) {
        state.sending = isSending;
        sendBtn.disabled = isSending;
        inputEl.disabled = isSending;
      }

      function setConnection(isConnected) {
        state.connected = Boolean(isConnected);
        if (!statusEl) return;
        statusEl.classList.toggle('connected', state.connected);
        const label = state.connected ? 'Есть соединение с чатом' : 'Нет соединения с чатом';
        statusEl.setAttribute('aria-label', label);
        statusEl.setAttribute('title', label);
      }

      function restoreChatId() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored && stored.trim()) return stored;
        } catch {}
        const fresh = generateId();
        persistChatId(fresh);
        return fresh;
      }

      function persistChatId(id) {
        try { localStorage.setItem(STORAGE_KEY, id); } catch {}
      }

      function generateId() {
        if (window.crypto?.randomUUID) return crypto.randomUUID();
        return 'chat-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      }
    })();
  </script>
</body>
</html>
