# Public entrypoint for admin chat on /chat/, while /chat/internal/ remains protected in its own block.
# Place after the /chat/internal/ block in the server config for app.gtstor.com.

location = /chat {
    return 301 /chat/;
}

location = /chat/ {
    try_files /chat/internal/index.html =404;
    add_header Cache-Control "no-store";
}

location = /chat/index.html {
    return 302 /chat/;
}

location ^~ /chat/ {
    alias /var/www/gtc-form/chat/;
    index index.html;
    try_files $uri $uri/ /chat/internal/index.html;
    add_header Cache-Control "no-store";
}
