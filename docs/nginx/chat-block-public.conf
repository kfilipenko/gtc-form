# Public access to /chat/ (SPA), while /chat/internal/ remains protected in its own block.
# Place after the /chat/internal/ block in the server config for app.gtstor.com.

location ^~ /chat/ {
    alias /var/www/gtc-form/chat/;
    index index.html;
    try_files $uri $uri/ /chat/index.html;
    add_header Cache-Control "no-store";
}
