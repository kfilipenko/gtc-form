# Include this location block in the app.gtstor.com server config to protect the internal chat.
# Example: add `include /var/www/gtc-form/docs/nginx/chat-internal.conf;` inside the `server { ... }` block.

# Create the password file (once):
#   htpasswd -c /etc/nginx/htpasswd_chat_internal kfilipenko@kkmf.ru
# To add/update another admin:
#   htpasswd /etc/nginx/htpasswd_chat_internal other@domain

location ^~ /chat/internal/ {
    auth_basic "GTC internal chat";
    auth_basic_user_file /etc/nginx/htpasswd_chat_internal;

    # Optional: prevent indexing / listing
    autoindex off;
}
