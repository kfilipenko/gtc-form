<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RJAKA • Prompt-блок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --raspberry: #B0164D;
      --magenta: #E34A8A;
      --black: #0E0610;
      --gold: #F2B94B;
      --turquoise: #2FA4A9;
      --mask: #D6D6D2;
      --text: #f7f2f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 18% 20%, rgba(242,185,75,0.14), transparent 32%),
                  radial-gradient(circle at 82% 10%, rgba(227,74,138,0.18), transparent 36%),
                  linear-gradient(135deg, rgba(11,5,16,0.95) 0%, rgba(17,9,22,0.9) 50%, rgba(11,5,16,0.95) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 48px);
    }
    .shell {
      width: min(960px, 100%);
      border-radius: 28px;
      background: linear-gradient(160deg, rgba(176,22,77,0.30), rgba(46,13,24,0.62) 45%, rgba(12,6,16,0.92) 100%);
      box-shadow:
        0 40px 120px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(255,255,255,0.05);
      padding: clamp(18px, 4vw, 36px);
      backdrop-filter: blur(8px);
    }
    .hero {
      display: flex;
      gap: clamp(16px, 4vw, 32px);
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: clamp(16px, 3vw, 28px);
    }
    .title {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      letter-spacing: 0.02em;
      margin: 0 0 6px;
      color: #ffe7f2;
      text-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .subtitle {
      margin: 0;
      color: rgba(215,215,210,0.9);
      max-width: 640px;
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(242,185,75,0.28), rgba(47,164,169,0.28));
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .card {
      background: linear-gradient(150deg, rgba(14,6,16,0.9), rgba(176,22,77,0.2));
      border-radius: 22px;
      padding: clamp(16px, 3vw, 24px);
      box-shadow:
        0 24px 70px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .label {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      color: rgba(242,185,75,0.9);
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: radial-gradient(circle at 10% 10%, rgba(227,74,138,0.18), transparent 35%),
                  rgba(15,8,18,0.8);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      color: #0c0710;
    }
    .btn-primary {
      background: linear-gradient(120deg, var(--gold), var(--turquoise));
      box-shadow: 0 16px 40px rgba(242,185,75,0.4);
    }
    .btn-secondary {
      background: linear-gradient(120deg, rgba(255,255,255,0.08), rgba(255,255,255,0.18));
      color: #f2ecf2;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 0.9; }
    @media (max-width: 640px) {
      .shell { padding: 16px; }
      textarea { min-height: 160px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1 class="title">🧠 Готовый prompt-блок для ИИ</h1>
        <p class="subtitle">Скопируйте текст ниже и используйте в ваших сценариях. Палитра и атмосфера — театральный бархат с мягкими градиентами, готово к Wix.</p>
      </div>
      <span class="badge">RJAKA • Stage Mode</span>
    </div>

    <div class="card">
      <div class="label">Prompt</div>
      <textarea readonly>
You are “RJAKA Assistant” — an expert game-master for the role-based humor game “РЖАКА”.
Use the RJAKA documents via Postgres PGVector as the single source of truth (rules, mechanics, scoring, roles, card formats, examples). Do NOT invent rules not present in context. If context is missing, ask for the missing piece.
Language: Russian by default. Tone: confident, clear, motivating; humor allowed but clean.
If creating cards: give “Card Title” + “How to perform” (playable script), 2–3 variants optional.
If asked for сценка: give mini-script (setup → twist → punchline) with optional gestures/intonation notes.
Formatting: short headings + bullets/steps. Don’t expose internal tooling or vector db terms.
If uncertain: ask 1–2 precise clarification questions and suggest next action.
      </textarea>
      <div class="actions">
        <button class="btn btn-primary" onclick="navigator.clipboard?.writeText(document.querySelector('textarea').value)">Скопировать prompt</button>
        <button class="btn btn-secondary" onclick="alert('Вставьте этот блок в ваш ИИ-сценарий.')">Инструкция</button>
      </div>
    </div>
  </div>
</body>
</html>
