<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GTC Auth</title>
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:#fff;color:#111;display:grid;place-items:center;min-height:100vh}
    .wrap{width:min(520px,92vw);padding:28px 22px;border-radius:14px;border:1px solid #eee;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h1{font-size:1.6rem;margin:.2rem 0 1rem;text-align:center}
    .btn{display:block;width:100%;padding:12px 14px;margin-top:12px;border-radius:10px;border:1px solid #ddd;background:#111;color:#fff;text-decoration:none;text-align:center;font-weight:600}
    .btn.secondary{background:#fff;color:#111}
    .hint{margin-top:10px;text-align:center;font-size:.95rem;color:#555}
    .links{margin-top:12px;text-align:center}
    .links a{color:#2962ff;text-decoration:none}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Welcome to GTC</h1>
    <a class="btn secondary" href="/auth/email/">Continue with Email</a>
    <a class="btn" href="/auth/google/">Continue with Google</a>
    
  </main>
</body>
</html>
