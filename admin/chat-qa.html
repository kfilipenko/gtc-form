<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>РЖАКА — Вопросы и ответы из чата</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(96,165,250,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(16,185,129,0.08), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 12px;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: min(1080px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .title { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .status { margin: 0; color: var(--muted); font-size: 0.92rem; }
    .toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      background: rgba(255,255,255,0.02);
    }
    .toolbar input,
    .toolbar select {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }
    .toolbar button {
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #0b1220;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }
    .toolbar button:disabled { opacity: 0.6; cursor: not-allowed; }
    .list {
      padding: 14px 16px 18px;
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0b1220;
      padding: 12px 14px;
    }
    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.84rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
    }
    .label {
      display: inline-block;
      min-width: 92px;
      color: #93c5fd;
      font-weight: 600;
    }
    .text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      color: var(--text);
    }
    .empty {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.02);
    }
    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1 class="title">РЖАКА — вопросы и ответы из чатов</h1>
      <p class="status" id="status">Загрузка...</p>
    </header>

    <form class="toolbar" id="filters" autocomplete="off">
      <input id="search" type="search" placeholder="Поиск по вопросу или ответу" />
      <select id="limit">
        <option value="20">20</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="200">200</option>
      </select>
      <button type="submit" id="refreshBtn">Обновить</button>
    </form>

    <section class="list" id="list" aria-live="polite"></section>
  </div>

  <script>
    (() => {
      const API_URL = '/admin/chat-qa.php';
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');
      const filtersEl = document.getElementById('filters');
      const searchEl = document.getElementById('search');
      const limitEl = document.getElementById('limit');
      const refreshBtn = document.getElementById('refreshBtn');

      filtersEl.addEventListener('submit', (event) => {
        event.preventDefault();
        loadData();
      });

      loadData();

      async function loadData() {
        setBusy(true);
        try {
          const url = new URL(API_URL, window.location.origin);
          const q = (searchEl.value || '').trim();
          if (q) url.searchParams.set('q', q);
          url.searchParams.set('limit', limitEl.value || '50');

          const res = await fetch(url.toString(), {
            method: 'GET',
            headers: { Accept: 'application/json' }
          });
          const data = await res.json().catch(() => null);

          if (!res.ok || !data?.success) {
            throw new Error(data?.error || 'Ошибка загрузки истории');
          }

          renderList(Array.isArray(data.items) ? data.items : []);

          const stats = data.stats || {};
          const users = Number(stats.user_messages || 0);
          const assistants = Number(stats.assistant_messages || 0);
          const pairs = Number(stats.pairs_found || 0);
          statusEl.textContent = `Пары: ${pairs} · user: ${users} · assistant: ${assistants}`;
        } catch (error) {
          listEl.innerHTML = `<div class="empty">Не удалось загрузить данные: ${escapeHtml(error?.message || 'неизвестная ошибка')}</div>`;
          statusEl.textContent = 'Ошибка загрузки';
        } finally {
          setBusy(false);
        }
      }

      function renderList(items) {
        if (!items.length) {
          listEl.innerHTML = '<div class="empty">Пары вопрос-ответ пока не найдены.</div>';
          return;
        }

        listEl.innerHTML = items.map((item) => {
          const chatId = escapeHtml(item.chat_id || '—');
          const askedAt = escapeHtml(formatDate(item.asked_at));
          const answeredAt = escapeHtml(formatDate(item.answered_at));
          const question = escapeHtml(item.question || '—');
          const answer = escapeHtml(item.answer || '—');

          return `
            <article class="card">
              <p class="meta">
                <span>chat_id: ${chatId}</span>
                <span>вопрос: ${askedAt}</span>
                <span>ответ: ${answeredAt}</span>
              </p>
              <p class="text"><span class="label">Вопрос</span>${question}</p>
              <p class="text" style="margin-top:8px;"><span class="label">Ответ</span>${answer}</p>
            </article>
          `;
        }).join('');
      }

      function setBusy(isBusy) {
        refreshBtn.disabled = isBusy;
        searchEl.disabled = isBusy;
        limitEl.disabled = isBusy;
      }

      function formatDate(value) {
        const d = new Date(value || '');
        if (Number.isNaN(d.getTime())) return '—';
        return d.toLocaleString('ru-RU');
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    })();
  </script>
</body>
</html>
