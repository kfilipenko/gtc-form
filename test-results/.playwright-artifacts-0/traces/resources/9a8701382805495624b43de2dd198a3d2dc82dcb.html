<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrewPortGlobal | Operator review queue</title>
  <meta name="description" content="CrewPortGlobal operator queue for reviewing submitted registration drafts.">
  <link rel="canonical" href="https://crewportglobal.com/verify/">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="../assets/crewportglobal-docs.css">
  <style>
    .queue-card { padding: 28px; }
    .status-note { color: var(--muted-on-dark); }
    .queue-controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .queue-control {
      display: grid;
      gap: 6px;
    }
    .queue-control label {
      color: var(--muted-on-dark);
      font-size: 13px;
    }
    .queue-control select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-on-dark);
      font: inherit;
    }
    .queue-table-wrap { overflow-x: auto; margin-top: 18px; }
    .queue-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .queue-table th, .queue-table td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; color: var(--muted-on-dark); }
    .queue-table th { color: var(--text-on-dark); font-weight: 600; }
    .queue-type { font-size: 12px; border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; display: inline-block; }
    .details-card {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.04);
    }
    .details-title {
      margin: 0 0 8px;
      color: var(--text-on-dark);
    }
    .details-json {
      margin: 0;
      color: var(--muted-on-dark);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 980px) {
      .queue-controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="doc-body">
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="https://crewportglobal.com/">
        <span class="brand-mark">CPG</span>
        <span class="brand-copy">
          <strong>CrewPortGlobal</strong>
          <span data-i18n="site.tagline">Maritime documentation and matching platform</span>
        </span>
      </a>
      <div id="language-selector" class="language-selector">
        <button id="current-language-toggle" class="language-toggle" type="button" aria-expanded="false" aria-controls="header-language-menu" aria-label="Open language selector">
          <span class="language-toggle__flag" id="current-language-flag" aria-hidden="true">🇬🇧</span>
          <span class="language-toggle__copy">
            <span class="language-toggle__hint" data-i18n="site.languageLabel">Language</span>
            <span class="language-toggle__label" id="current-language-label">English</span>
          </span>
          <span class="language-toggle__chevron" aria-hidden="true">▾</span>
        </button>
        <div id="header-language-menu" class="language-menu" hidden>
          <div id="header-language-options" class="language-menu__options" role="listbox" aria-label="Language options"></div>
        </div>
      </div>
    </header>

    <nav class="site-nav" aria-label="Verify navigation">
      <a class="nav-link" href="https://crewportglobal.com/" data-i18n="nav.home">Home</a>
      <a class="nav-link" href="https://crewportglobal.com/register/" data-i18n="nav.loginRegister">Login / Register</a>
      <a class="nav-link is-active" href="https://crewportglobal.com/verify/" data-i18n="verify.nav.queue">Operator Queue</a>
    </nav>

    <main class="doc-main">
      <section class="card queue-card">
        <p class="eyebrow" data-i18n="verify.eyebrow">Operator review</p>
        <h1 data-i18n="verify.title">Submitted Draft Queue</h1>
        <p class="status-note" id="queue-status" data-i18n="verify.loading">Loading operator queue...</p>

        <div class="queue-controls">
          <div class="queue-control">
            <label for="filter-type" data-i18n="verify.filter.type">Type</label>
            <select id="filter-type">
              <option value="all" data-i18n="verify.filter.all">All</option>
              <option value="seafarer_profile" data-i18n="verify.filter.seafarerType">Seafarer profile</option>
              <option value="company_verification" data-i18n="verify.filter.companyType">Company verification</option>
            </select>
          </div>
          <div class="queue-control">
            <label for="filter-role" data-i18n="verify.filter.role">Role</label>
            <select id="filter-role">
              <option value="all" data-i18n="verify.filter.all">All</option>
              <option value="seafarer">seafarer</option>
              <option value="employer">employer</option>
              <option value="shipowner">shipowner</option>
              <option value="crewing_manager">crewing_manager</option>
            </select>
          </div>
          <div class="queue-control">
            <label for="filter-status" data-i18n="verify.filter.status">Status</label>
            <select id="filter-status">
              <option value="all" data-i18n="verify.filter.all">All</option>
              <option value="submitted_for_human_review">submitted_for_human_review</option>
              <option value="in_review">in_review</option>
              <option value="unverified">unverified</option>
              <option value="submitted">submitted</option>
            </select>
          </div>
          <div class="queue-control">
            <label for="sort-order" data-i18n="verify.filter.sort">Sort</label>
            <select id="sort-order">
              <option value="updated_desc" data-i18n="verify.sort.updatedDesc">Updated desc</option>
              <option value="updated_asc" data-i18n="verify.sort.updatedAsc">Updated asc</option>
              <option value="created_desc" data-i18n="verify.sort.createdDesc">Created desc</option>
              <option value="created_asc" data-i18n="verify.sort.createdAsc">Created asc</option>
            </select>
          </div>
        </div>

        <div class="queue-table-wrap">
          <table class="queue-table" aria-label="Operator review queue table">
            <thead>
              <tr>
                <th data-i18n="verify.col.type">Type</th>
                <th data-i18n="verify.col.role">Role</th>
                <th data-i18n="verify.col.email">Email</th>
                <th data-i18n="verify.col.name">Name</th>
                <th data-i18n="verify.col.status">Status</th>
                <th data-i18n="verify.col.summary">Summary</th>
                <th data-i18n="verify.col.updated">Updated</th>
                <th data-i18n="verify.col.actions">Actions</th>
              </tr>
            </thead>
            <tbody id="queue-body"></tbody>
          </table>
        </div>

        <section class="details-card">
          <h2 class="details-title" data-i18n="verify.details.title">Draft details</h2>
          <pre id="details-json" class="details-json" data-i18n="verify.details.empty">Select a queue item to load full draft details.</pre>
        </section>
      </section>
    </main>
  </div>

  <script src="../assets/crewportglobal-public-i18n.js" defer></script>
  <script>
    (function () {
      const status = document.getElementById('queue-status');
      const body = document.getElementById('queue-body');
      const detailsJson = document.getElementById('details-json');
      const filterType = document.getElementById('filter-type');
      const filterRole = document.getElementById('filter-role');
      const filterStatus = document.getElementById('filter-status');
      const sortOrder = document.getElementById('sort-order');
      let queueItems = [];

      function getLanguage() {
        const lang = document.documentElement.lang || 'en';
        return window.CREWPORTGLOBAL_PAGE_TRANSLATIONS[lang] ? lang : 'en';
      }

      function t(key, values) {
        const lang = getLanguage();
        const raw = window.CREWPORTGLOBAL_PAGE_TRANSLATIONS[lang][key] || window.CREWPORTGLOBAL_PAGE_TRANSLATIONS.en[key] || key;
        if (!values) {
          return raw;
        }
        return Object.entries(values).reduce((acc, entry) => acc.replace(`{${entry[0]}}`, String(entry[1])), raw);
      }

      function summaryText(item) {
        if (!item || typeof item !== 'object' || !item.summary || typeof item.summary !== 'object') {
          return '-';
        }
        const chunks = [];
        Object.keys(item.summary).forEach((key) => {
          const value = item.summary[key];
          if (value !== null && value !== undefined && String(value).trim() !== '') {
            chunks.push(`${key}: ${value}`);
          }
        });
        return chunks.length ? chunks.join(' | ') : '-';
      }

      function compareBy(sortValue, left, right) {
        const pick = (obj, field) => String(obj && obj[field] ? obj[field] : '');
        if (sortValue === 'updated_asc') {
          return pick(left, 'updated_at').localeCompare(pick(right, 'updated_at'));
        }
        if (sortValue === 'created_desc') {
          return pick(right, 'created_at').localeCompare(pick(left, 'created_at'));
        }
        if (sortValue === 'created_asc') {
          return pick(left, 'created_at').localeCompare(pick(right, 'created_at'));
        }
        return pick(right, 'updated_at').localeCompare(pick(left, 'updated_at'));
      }

      function filteredQueue() {
        const typeValue = filterType.value;
        const roleValue = filterRole.value;
        const statusValue = filterStatus.value;
        const sortValue = sortOrder.value;

        return queueItems
          .filter((item) => (typeValue === 'all' ? true : item.queue_type === typeValue))
          .filter((item) => (roleValue === 'all' ? true : item.role === roleValue))
          .filter((item) => (statusValue === 'all' ? true : item.status === statusValue))
          .sort((left, right) => compareBy(sortValue, left, right));
      }

      async function loadDraftDetails(draftId) {
        if (!draftId) {
          return;
        }

        detailsJson.textContent = t('verify.details.loading');
        try {
          const response = await fetch(`/api/v1/registration/drafts/${encodeURIComponent(draftId)}`);
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload || payload.ok !== true) {
            throw new Error('draft_details_load_failed');
          }
          detailsJson.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          detailsJson.textContent = t('verify.details.error');
          console.error(error);
        }
      }

      async function applyDecision(draftId, decision) {
        if (!draftId || !decision) {
          return;
        }

        status.textContent = t('verify.action.saving');
        try {
          const response = await fetch(`/api/v1/operator/review-queue/${encodeURIComponent(draftId)}/status`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ decision }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload || payload.ok !== true) {
            throw new Error('operator_decision_failed');
          }

          status.textContent = t('verify.action.saved', { decision: payload.new_status || decision });
          await loadQueue();
          await loadDraftDetails(draftId);
        } catch (error) {
          status.textContent = t('verify.action.error');
          console.error(error);
        }
      }

      function renderQueue() {
        const items = filteredQueue();
        body.innerHTML = '';
        if (!Array.isArray(items) || items.length === 0) {
          status.textContent = t('verify.empty');
          return;
        }

        items.forEach((item) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="queue-type">${item.queue_type || '-'}</span></td>
            <td>${item.role || '-'}</td>
            <td>${item.email || '-'}</td>
            <td>${item.full_name || '-'}</td>
            <td>${item.status || '-'}</td>
            <td>${summaryText(item)}</td>
            <td>${item.updated_at || '-'}</td>
            <td>
              <div class="inline-actions">
                <button type="button" class="button secondary queue-open" data-draft-id="${item.draft_id || ''}">${t('verify.action.open')}</button>
                <button type="button" class="button secondary queue-decision" data-draft-id="${item.draft_id || ''}" data-decision="start_review">${t('verify.action.startReview')}</button>
                <button type="button" class="button secondary queue-decision" data-draft-id="${item.draft_id || ''}" data-decision="needs_correction">${t('verify.action.needsCorrection')}</button>
                <button type="button" class="button secondary queue-decision" data-draft-id="${item.draft_id || ''}" data-decision="reviewed">${t('verify.action.reviewed')}</button>
              </div>
            </td>
          `;
          body.appendChild(tr);
        });

        status.textContent = t('verify.loaded', { count: queueItems.length, shown: items.length });

        body.querySelectorAll('.queue-open').forEach((button) => {
          button.addEventListener('click', () => {
            loadDraftDetails(button.getAttribute('data-draft-id') || '');
          });
        });

        body.querySelectorAll('.queue-decision').forEach((button) => {
          button.addEventListener('click', () => {
            applyDecision(
              button.getAttribute('data-draft-id') || '',
              button.getAttribute('data-decision') || ''
            );
          });
        });
      }

      async function loadQueue() {
        status.textContent = t('verify.loading');
        try {
          const response = await fetch('/api/v1/operator/review-queue');
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload || payload.ok !== true) {
            throw new Error('queue_load_failed');
          }
          queueItems = Array.isArray(payload.queue) ? payload.queue : [];
          renderQueue();
        } catch (error) {
          status.textContent = t('verify.error');
          console.error(error);
        }
      }

      [filterType, filterRole, filterStatus, sortOrder].forEach((control) => {
        control.addEventListener('change', () => {
          renderQueue();
        });
      });

      window.addEventListener('crewportglobal:languagechange', () => {
        renderQueue();
      });

      loadQueue();
    })();
  </script>
</body>
