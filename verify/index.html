<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GTC Verify Email</title>
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:#fff;color:#111;display:grid;place-items:center;min-height:100vh}
    .wrap{width:min(520px,92vw);padding:28px 22px;border-radius:14px;border:1px solid #eee;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h1{font-size:1.5rem;margin:.2rem 0 1rem;text-align:center}
    .msg{margin-top:10px;font-size:.95rem}
    .links{text-align:center;margin-top:12px}
    .links a{color:#2962ff;text-decoration:none}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Email verification</h1>
    <div id="out" class="msg"></div>
    <div id="noToken" class="msg" style="display:none"></div>
    <div class="links">
      <button id="resend" style="display:none">Resend verification email</button>
      <a id="goNext" href="/user/" style="display:none;margin-left:8px">Continue</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    function safeNext(n){
      const fallback = '/chat/internal/';
      if (!n) return fallback;
      try {
        const u = new URL(n, location.origin);
        if (u.origin !== location.origin) return fallback;
        return u.pathname + (u.search||'') + (u.hash||'');
      } catch {
        return fallback;
      }
    }
  const rawNext = params.get('next');
  const hasNext = !!rawNext;
  const nextUrl = safeNext(rawNext);
    const token = params.get('token');
    const out = document.getElementById('out');
    const goNext = document.getElementById('goNext');
    const noToken = document.getElementById('noToken');
    const btnResend = document.getElementById('resend');
    const savedEmail = (()=>{ try{ return localStorage.getItem('email') || ''; }catch(e){ return ''; } })();

    if (!token){
      // Нет токена: показываем инструкцию и предлагаем переотправить письмо
      noToken.style.display = 'block';
      noToken.textContent = savedEmail
        ? `We sent a verification email to ${savedEmail}. Please check your inbox and click the link.`
        : 'We sent a verification email. Please check your inbox and click the link.';
      btnResend.style.display = savedEmail ? 'inline-block' : 'none';
      if (hasNext){
        goNext.href = nextUrl;
        goNext.style.display = 'inline-block';
      }
      btnResend.addEventListener('click', async ()=>{
        out.textContent = '';
        try{
          const r = await fetch('/auth/request_email_verification', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: savedEmail }) });
          const j = await r.json().catch(()=>({}));
          if (j && j.sent) out.textContent = 'Verification email resent.'; else out.textContent = 'Unable to resend email.';
        }catch(e){ out.textContent = 'Error: ' + e.message; }
      });
    } else {
      fetch('/auth/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token }) })
        .then(r=>r.json())
        .then(j=>{
          if (j && !j.error){
            out.textContent = 'Your email has been verified.';
            try{
              if (j.email) localStorage.setItem('email', j.email);
              if (j.gtc_user_id) localStorage.setItem('gtc_user_id', String(j.gtc_user_id));
              if (j.id) localStorage.setItem('id', String(j.id));
              localStorage.setItem('email_verified', 'true');
            }catch(e){}
            // Показываем явную ссылку, но не перенаправляем автоматически
            if (hasNext) {
              goNext.href = nextUrl;
              goNext.textContent = 'Continue';
              goNext.style.display = 'inline-block';
            } else {
              goNext.href = '/chat/internal/';
              goNext.textContent = 'Open internal chat';
              goNext.style.display = 'inline-block';
            }
          } else {
            out.textContent = 'Error: ' + (j?.error || 'unknown');
          }
        })
        .catch(e=>{ out.textContent = 'Error: ' + e.message; });
    }
  </script>
</body>
</html>
