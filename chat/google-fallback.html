<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google sign-in — fallback</title>
  <style>
    body { margin: 0; font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; background: #020617; color: #e2e8f0; display: grid; place-items: center; padding: 24px; }
    main { width: min(460px, 94vw); border: 1px solid rgba(226,232,240,0.2); border-radius: 20px; padding: 28px; background: rgba(15,23,42,0.85); display: flex; flex-direction: column; gap: 18px; box-shadow: 0 20px 45px rgba(2,6,23,0.65); }
    h1 { margin: 0; font-size: 1.4rem; }
    p { margin: 0; color: rgba(226,232,240,0.8); }
    #googleHost { min-height: 60px; }
    .status { border: 1px solid rgba(226,232,240,0.2); border-radius: 14px; padding: 10px 12px; font-size: 0.95rem; }
    .status[data-tone="ok"] { border-color: rgba(34,197,94,0.6); color: #4ade80; }
    .status[data-tone="warn"] { border-color: rgba(250,204,21,0.6); color: #fde047; }
    .status[data-tone="err"] { border-color: rgba(248,113,113,0.6); color: #f87171; }
    button { border: none; border-radius: 999px; padding: 12px 18px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-ghost { background: transparent; border: 1px solid rgba(226,232,240,0.2); color: #e2e8f0; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main>
    <div>
      <h1>Google sign-in fallback</h1>
      <p>Approve Google sign-in in this window. We will return you to the chat automatically.</p>
    </div>
    <div id="googleHost"></div>
    <div id="status" class="status" data-tone="warn">Waiting for Google script…</div>
    <button id="closeBtn" class="btn-ghost" type="button">Cancel</button>
  </main>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const CLIENT_ID = params.get('client_id') || '295337863113-sjl11e4rfttsqgaubfhl9ketv5nv20jc.apps.googleusercontent.com';
      const statusBox = document.getElementById('status');
      const host = document.getElementById('googleHost');
      const closeBtn = document.getElementById('closeBtn');

      function setStatus(text, tone) {
        statusBox.textContent = text;
        statusBox.dataset.tone = tone || 'warn';
      }

      function renderButton() {
        if (!window.google?.accounts?.id || !host) {
          setTimeout(renderButton, 200);
          return;
        }
        try {
          window.google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleCredential,
            ux_mode: 'popup'
          });
          window.google.accounts.id.renderButton(host, {
            theme: 'outline',
            size: 'large',
            shape: 'pill',
            text: 'continue_with'
          });
          setStatus('Click the Google button above to continue.', 'warn');
        } catch (err) {
          setStatus('Unable to render Google button: ' + err.message, 'err');
        }
      }

      async function handleCredential(resp) {
        if (!resp?.credential) {
          setStatus('Google did not return a credential. Try again.', 'err');
          return;
        }
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'google-fallback-credential', credential: resp.credential }, window.location.origin);
          setStatus('Credential sent. You can close this window.', 'ok');
          setTimeout(() => { try { window.close(); } catch (_) {} }, 1200);
        } else {
          setStatus('Main window closed. Return to chat and run Google sign-in again.', 'err');
        }
      }

      closeBtn.addEventListener('click', () => {
        try { window.close(); } catch (_) {}
      });

      window.handleCredential = handleCredential;
      renderButton();
    })();
  </script>
</body>
</html>
