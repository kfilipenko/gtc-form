Описание регистрационной формы /auth/
Фронтовая регистрация/вход реализована в статической странице Client/gtc-form/gtc_chat.html (и идентичной копии Client/gtc-form/gtc_chat/index.html). Она объединяет вход, регистрацию, повторную отправку письма и переход в чат через /auth/finish, работая напрямую с бекендом GTC1 (/auth/*) без сторонних доменов.

В секции “Вход” есть поля email/пароль и кнопка “Войти и открыть чат”, которая вызывает POST на /auth/login, а затем перенаправляет на /auth/finish. Статусы успеха/ошибок выводятся под кнопкой.

В секции “Регистрация” есть поля имя/email/пароль, кнопка “Зарегистрироваться” (POST /auth/register) и пояснение, что после подтверждения почты нужно перейти в чат через /auth/finish. Есть отдельная кнопка для повторной отправки письма (POST /auth/request_email_verification).

Кнопка “Перейти в чат” вызывает функцию goToFinish(), которая открывает /auth/finish с сохранением query‑параметров. Это основной путь в чат после входа/регистрации.

Файлы и ссылки
Основной файл страницы: Client/gtc-form/gtc_chat.html — его можно отдавать как /auth/ или копировать как есть для интеграции в существующие страницы.

Каталожная копия: Client/gtc-form/gtc_chat/index.html содержит тот же HTML/JS (1:1), на случай если сервер обслуживает каталог как /gtc_chat/ вместо HTML-алиаса.

Полный код (можно вставить как есть)
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta name="robots" content="noindex" />
  <title>GTC Chat | Единая точка входа</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0b1021;
      --panel: #11162a;
      --panel-2: #111827;
      --fg: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22d3ee;
      --primary-soft: rgba(34, 211, 238, 0.18);
      --accent: #8b5cf6;
      --border: #1f2937;
      --success: #34d399;
      --error: #f87171;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.06), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(139, 92, 246, 0.08), transparent 28%),
        var(--bg);
      color: var(--fg);
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }

    header {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 22px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .build {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 22px 50px;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, 520px);
      gap: 26px;
    }

    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
      header { padding: 20px; }
    }

    .hero {
      background: linear-gradient(145deg, rgba(34, 211, 238, 0.12), rgba(139, 92, 246, 0.1));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 25px 55px rgba(0, 0, 0, 0.35);
      display: grid;
      gap: 16px;
      align-content: start;
    }

    h1 { margin: 0; font-size: clamp(1.9rem, 3.5vw, 2.6rem); line-height: 1.1; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }

    .cta-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

    .btn {
      padding: 12px 16px;
      border: 1px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      color: #0b1021;
      background: var(--primary);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 20px 40px rgba(34, 211, 238, 0.35);
    }

    .btn.secondary {
      background: transparent;
      color: var(--fg);
      border-color: var(--border);
      box-shadow: none;
    }

    .btn:hover { transform: translateY(-1px); }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 25px 65px rgba(0, 0, 0, 0.4);
    }

    .panel h2 { margin: 0 0 10px; font-size: 1.3rem; }
    .panel small { color: var(--muted); }

    label { display: block; margin: 10px 0 6px; color: #cbd5e1; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18);
    }

    .grid { display: grid; gap: 12px; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }

    .muted { color: var(--muted); font-size: 0.95rem; }
    .status { margin-top: 12px; font-weight: 600; }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .inline-link { color: var(--primary); font-weight: 600; text-decoration: none; }
    .inline-link:hover { text-decoration: underline; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.12);
      color: #e9d5ff;
      font-weight: 600;
      margin-top: 6px;
    }

    .list { margin: 10px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.5; }
