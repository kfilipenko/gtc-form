</head>
<body>
  <header>
    <div class="brand">GTC · Chat</div>
    <div class="pill">Единая точка входа</div>
    <div class="build">Сборка: <span id="buildTag">—</span></div>
  </header>
  <main>
    <section class="hero">
      <h1>Чат и регистрация в одном окне</h1>
      <p>Используйте эту страницу, чтобы зарегистрироваться, подтвердить email и сразу перейти в чат на <strong>app.gtstor.com</strong>. Все запросы уходят на бекенд GTC1 (<code>/auth/*</code>) без сторонних доменов и лишних редиректов.</p>
      <div class="cta-row">
        <button class="btn" id="openChat">Перейти в чат</button>
        <button class="btn secondary" id="resendLink">Отправить письмо повторно</button>
      </div>
      <div class="badge">Поддерживаются вход и регистрация по email / паролю</div>
    </section>

    <section class="panel">
      <h2>Вход</h2>
      <small>Уже есть аккаунт? Авторизуйтесь и мы перенаправим вас в чат.</small>
      <div class="grid" style="margin-top:12px">
        <div class="row">
          <div>
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" autocomplete="email" />
          </div>
          <div>
            <label for="loginPassword">Пароль</label>
            <input id="loginPassword" type="password" autocomplete="current-password" />
          </div>
        </div>
        <button class="btn" id="loginSubmit">Войти и открыть чат</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </section>

    <section class="panel">
      <h2>Регистрация</h2>
      <small>Создайте аккаунт и подтвердите email, чтобы попасть в чат.</small>
      <div class="grid" style="margin-top:12px">
        <label for="signupName">Имя (необязательно)</label>
        <input id="signupName" type="text" autocomplete="name" />

        <div class="row">
          <div>
            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" autocomplete="email" />
          </div>
          <div>
            <label for="signupPassword">Пароль</label>
            <input id="signupPassword" type="password" autocomplete="new-password" />
          </div>
        </div>

        <button class="btn" id="signupSubmit">Зарегистрироваться</button>
        <div id="signupStatus" class="status"></div>
        <p class="muted">После подтверждения почты нажмите «Перейти в чат» — откроется <code>/auth/finish</code>, который определит, есть ли у вас доступ.</p>
      </div>
    </section>

    <section class="panel">
      <h2>Что происходит после входа</h2>
      <p class="muted">Мы ставим служебную cookie <code>gtc_user_id</code> с доменом <strong>gtstor.com</strong> и вызываем <code>/auth/finish</code>. Если подписка активна, вы попадёте в чат. Иначе откроется страница оплаты.</p>
      <ul class="list">
        <li>Все запросы: <code>/auth/login</code>, <code>/auth/register</code>, <code>/auth/request_email_verification</code>.</li>
        <li>Кнопка «Перейти в чат» отправит вас на <code>/auth/finish</code> с сохранением query-параметров.</li>
        <li>Данные остаются на сервере GTC1 — без переходов на Vercel.</li>
      </ul>
    </section>
  </main>

  <script>
    const buildTag = '2025-02-17T00:00:00Z';
    const tagNode = document.getElementById('buildTag');
    if (tagNode) { tagNode.textContent = buildTag; }

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginStatus = document.getElementById('loginStatus');
    const loginSubmit = document.getElementById('loginSubmit');

    const signupName = document.getElementById('signupName');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const signupStatus = document.getElementById('signupStatus');
    const signupSubmit = document.getElementById('signupSubmit');

    const openChat = document.getElementById('openChat');
    const resendLink = document.getElementById('resendLink');

    function setStatus(el, message, type) {
      el.textContent = message;
      el.className = `status ${type}`;
    }

    async function postJSON(path, payload) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let body = {};
        try { body = await res.json(); } catch (e) {}
        const err = new Error('Request failed');
        err.status = res.status;
        err.body = body;
        throw err;
      }
      return res.json();
    }

    function goToFinish() {
      const qs = window.location.search || '';
      window.location.href = `/auth/finish${qs}`;
    }

    loginSubmit.addEventListener('click', async () => {
      loginSubmit.disabled = true;
      setStatus(loginStatus, 'Выполняем вход...', '');
      try {
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        if (!email || !password) {
          setStatus(loginStatus, 'Укажите email и пароль.', 'error');
          return;
        }
        await postJSON('/auth/login', { email, password });
        setStatus(loginStatus, 'Успешно. Открываем чат...', 'success');
        goToFinish();
      } catch (err) {
        const reason = err.body?.code || `Ошибка ${err.status || ''}`;
        setStatus(loginStatus, `Не удалось войти: ${reason}`, 'error');
      } finally {
        loginSubmit.disabled = false;
      }
    });

    signupSubmit.addEventListener('click', async () => {
      signupSubmit.disabled = true;
      setStatus(signupStatus, 'Отправляем данные...', '');
      try {
        const email = signupEmail.value.trim();
        const password = signupPassword.value;
        const name = signupName.value.trim();
        if (!email || !password) {
          setStatus(signupStatus, 'Нужны email и пароль.', 'error');
          return;
        }
        await postJSON('/auth/register', { email, password, name });
        setStatus(signupStatus, 'Письмо с подтверждением отправлено. Проверьте почту.', 'success');
      } catch (err) {
        const reason = err.body?.code || `Ошибка ${err.status || ''}`;
        setStatus(signupStatus, `Не удалось зарегистрировать: ${reason}`, 'error');
      } finally {
        signupSubmit.disabled = false;
      }
    });

    resendLink.addEventListener('click', async () => {
      const email = signupEmail.value.trim() || loginEmail.value.trim();
      setStatus(signupStatus, '', '');
      setStatus(loginStatus, '', '');
      if (!email) {
        setStatus(signupStatus, 'Укажите email в форме регистрации или входа.', 'error');
        return;
      }
      resendLink.disabled = true;
      try {
        await postJSON('/auth/request_email_verification', { email });
        setStatus(signupStatus, 'Если email подтверждён, мы сообщим об этом. Иначе отправили новое письмо.', 'success');
      } catch (err) {
        setStatus(signupStatus, 'Не удалось запросить повторное письмо. Попробуйте позже.', 'error');
      } finally {
        resendLink.disabled = false;
      }
    });

    openChat.addEventListener('click', goToFinish);
  </script>
</body>
</html>

