<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — GTC</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #01040f 100%);
      color: #e2e8f0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(460px, 92vw);
      padding: 32px 28px;
      border-radius: 20px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      background: rgba(2, 6, 23, 0.65);
      box-shadow: 0 30px 60px rgba(2, 6, 23, 0.65);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    p.subtitle {
      margin: 0;
      color: rgba(226, 232, 240, 0.75);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 12px;
    }
    label {
      font-size: 0.9rem;
      color: rgba(226, 232, 240, 0.85);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      background: rgba(15, 23, 42, 0.65);
      color: #f8fafc;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.25);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(120deg, #38bdf8, #6366f1);
      color: #01040f;
    }
    .btn-ghost {
      border: 1px solid rgba(226, 232, 240, 0.2);
      color: #e2e8f0;
      background: transparent;
    }
    .status {
      font-size: 0.95rem;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.15);
      background: rgba(15, 23, 42, 0.55);
      display: none;
    }
    .status.ok { border-color: rgba(34, 197, 94, 0.6); color: #4ade80; }
    .status.err { border-color: rgba(248, 113, 113, 0.6); color: #f87171; }
    .status.warn { border-color: rgba(250, 204, 21, 0.6); color: #fde047; }
    .hint {
      font-size: 0.85rem;
      color: rgba(226, 232, 240, 0.65);
      margin-top: -6px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div>
      <h1>Reset your password</h1>
      <p class="subtitle">Enter a new password to regain access to the GTC chat workspace.</p>
    </div>
    <form id="resetForm" autocomplete="off">
      <div>
        <label for="newPassword">New password</label>
        <div class="row">
          <input id="newPassword" type="password" placeholder="Minimum 8 characters, 1 uppercase" required autocomplete="new-password" />
          <button id="togglePassword" class="btn-ghost" type="button" aria-pressed="false">Show</button>
        </div>
        <div class="hint" id="policyHint">Use at least 8 characters with one uppercase letter.</div>
      </div>
      <div>
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <div class="actions">
        <button id="generatePassword" class="btn-ghost" type="button">Generate strong password</button>
        <button id="submitBtn" class="btn-primary" type="submit">Save new password</button>
      </div>
    </form>
    <div id="status" class="status" role="status"></div>
    <button id="goChat" class="btn-ghost" type="button" hidden>Return to workspace</button>
  </main>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';
      const nextRaw = params.get('next') || '';
      const resetForm = document.getElementById('resetForm');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const submitBtn = document.getElementById('submitBtn');
      const statusBox = document.getElementById('status');
      const goChatBtn = document.getElementById('goChat');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const generatePasswordBtn = document.getElementById('generatePassword');
      const policyHint = document.getElementById('policyHint');
      const PASSWORD_POLICY = /^(?=.*[A-Z]).{8,}$/;

      function safeNext(value){
        if (!value) return '';
        try {
          const resolved = new URL(value, window.location.origin);
          if (resolved.origin !== window.location.origin) return '';
          return resolved.pathname + (resolved.search || '') + (resolved.hash || '');
        } catch (err) {
          return '';
        }
      }

      const nextUrl = safeNext(nextRaw) || '/user/?from=reset';

      function setStatus(text, variant){
        if (!text){
          statusBox.style.display = 'none';
          statusBox.textContent = '';
          statusBox.className = 'status';
          return;
        }
        statusBox.style.display = 'block';
        statusBox.textContent = text;
        statusBox.className = `status ${variant || ''}`.trim();
      }

      function disableForm(disabled){
        newPasswordInput.disabled = disabled;
        confirmPasswordInput.disabled = disabled;
        submitBtn.disabled = disabled;
        togglePasswordBtn.disabled = disabled;
        generatePasswordBtn.disabled = disabled;
      }

      function generatePassword(){
        function pick(source, count){
          let out = '';
          for (let i = 0; i < count; i += 1){
            out += source[Math.floor(Math.random() * source.length)];
          }
          return out;
        }
        const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
        const lower = 'abcdefghijkmnopqrstuvwxyz';
        const digits = '23456789';
        const symbols = '!@#$%^&*()-_+=';
        let pwd = pick(upper, 2) + pick(lower, 6) + pick(digits, 2) + pick(symbols, 2);
        pwd = pwd.split('').sort(() => Math.random() - 0.5).join('');
        return pwd;
      }

      function togglePasswordVisibility(){
        const showing = newPasswordInput.type === 'password';
        const newType = showing ? 'text' : 'password';
        newPasswordInput.type = newType;
        confirmPasswordInput.type = newType;
        togglePasswordBtn.textContent = showing ? 'Hide' : 'Show';
        togglePasswordBtn.setAttribute('aria-pressed', showing ? 'true' : 'false');
      }

      togglePasswordBtn.addEventListener('click', togglePasswordVisibility);

      generatePasswordBtn.addEventListener('click', () => {
        const pwd = generatePassword();
        newPasswordInput.value = pwd;
        confirmPasswordInput.value = pwd;
        policyHint.textContent = 'Password strength: good';
        try { newPasswordInput.focus(); newPasswordInput.select(); } catch (err) {}
      });

      newPasswordInput.addEventListener('input', () => {
        policyHint.textContent = PASSWORD_POLICY.test(newPasswordInput.value)
          ? 'Password strength: good'
          : 'Use at least 8 characters with one uppercase letter.';
      });

      goChatBtn.addEventListener('click', () => {
        window.location.href = nextUrl;
      });

      if (!token){
        setStatus('Invalid or expired link. Request a new password reset email.', 'err');
        disableForm(true);
        goChatBtn.hidden = false;
        return;
      }

      resetForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const password = newPasswordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();
        if (!PASSWORD_POLICY.test(password)){
          setStatus('Password is too weak. Use at least 8 characters with one uppercase letter.', 'warn');
          return;
        }
        if (password !== confirmPassword){
          setStatus('Passwords do not match.', 'warn');
          return;
        }
        setStatus('Saving new password...', 'warn');
        disableForm(true);
        try {
          const response = await fetch('/auth/reset_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ token, new_password: password })
          });
          const payload = await response.json().catch(() => ({}));
          if (response.ok && payload && payload.ok){
            setStatus('Password updated. Redirecting you to your workspace...', 'ok');
            goChatBtn.hidden = false;
            goChatBtn.textContent = 'Continue';
            setTimeout(() => {
              window.location.replace(nextUrl);
            }, 1500);
            return;
          }
          const errorCode = payload?.code || payload?.error || 'unknown_error';
          const messageMap = {
            weak_password: 'Password is too weak. Use at least 8 characters with one uppercase letter.',
            invalid_or_expired: 'Reset link is invalid or expired. Request a new email and try again.'
          };
          const friendly = messageMap[errorCode] || 'Unable to reset password. Please try again.';
          setStatus(friendly, 'err');
          disableForm(false);
        } catch (err) {
          setStatus('Network error: ' + err.message, 'err');
          disableForm(false);
        }
      });
    })();
  </script>
</body>
</html>
