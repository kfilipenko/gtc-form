<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GTC • User Chat</title>
  <meta http-equiv="refresh" content="0; url=/user/" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #05070f;
      color: #f3f6ff;
      text-align: center;
      padding: 32px;
    }
    a {
      color: #7ab8ff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    .card {
      padding: 32px 28px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(7,12,24,0.9);
      max-width: 420px;
      width: min(420px, 100%);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Redirecting you to the user chat…</h1>
    <p>
      If you are not redirected automatically, open
      <a href="/user/" rel="nofollow">/user/</a>.
    </p>
  </main>
</body>
</html>
